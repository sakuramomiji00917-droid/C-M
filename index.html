<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Global M&A Simulator - CEO Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&family=Noto+Sans+JP:wght@400;700;900&display=swap"
        rel="stylesheet">
    <style>
        /* =========================================
           🎨 全体スタイル・モダンアプリ配色設定
           ========================================= */
        :root {
            --bg: #f3f4f6;
            /* 少し明るいグレーでカードを浮かせる */
            --card-bg: #ffffff;
            --side: #0f172a;
            /* 深いネイビー */
            --side-text: #94a3b8;
            --side-active: #2563eb;
            --text-main: #1e293b;
            --text-mut: #64748b;
            --primary: #2563eb;
            /* 鮮やかなブルー */
            --primary-hover: #1d4ed8;
            --success: #10b981;
            /* エメラルドグリーン */
            --danger: #ef4444;
            /* ローズレッド */
            --warning: #f59e0b;
            /* アンバー */
            --gold: #d97706;
            /* VIPゴールド */
            --border: #e2e8f0;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 24px;
        }

        body {
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            background: var(--bg);
            color: var(--text-main);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* 📱 サイドバー (PC版) */
        .sidebar {
            width: 280px;
            background: var(--side);
            color: var(--side-text);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            z-index: 50;
            box-shadow: 4px 0 15px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
        }

        .sidebar-header {
            padding: 24px 20px;
            font-size: 22px;
            font-weight: 900;
            color: #ffffff;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            text-align: center;
            letter-spacing: 1px;
            background: linear-gradient(135deg, #1e293b, #0f172a);
        }

        .nav-menu {
            flex: 1;
            overflow-y: auto;
            padding: 20px 15px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .nav-item {
            padding: 12px 16px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            border-radius: 10px;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--side-text);
        }

        .nav-item:hover {
            background: rgba(255, 255, 255, 0.05);
            color: #ffffff;
            transform: translateX(4px);
        }

        .nav-item.active {
            background: var(--primary);
            color: #ffffff;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.4);
        }

        .company-summary {
            padding: 20px;
            background: rgba(0, 0, 0, 0.2);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .company-summary .val {
            color: #ffffff;
            font-size: 20px;
            font-weight: 900;
            margin-bottom: 12px;
            font-family: 'Inter', sans-serif;
            letter-spacing: -0.5px;
        }

        .sidebar-actions {
            padding: 20px;
            background: rgba(0, 0, 0, 0.3);
        }

        /* 🖥️ メインコンテンツエリア */
        .main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        .content-area {
            flex: 1;
            padding: 30px 40px;
            overflow-y: auto;
            scroll-behavior: smooth;
        }

        .view-section {
            display: none;
            animation: appFadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .view-section.active {
            display: block;
        }

        @keyframes appFadeIn {
            from {
                opacity: 0;
                transform: translateY(15px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 🏆 タイトルと見出し */
        h2 {
            font-size: 28px;
            font-weight: 900;
            margin-top: 0;
            margin-bottom: 24px;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 12px;
            letter-spacing: -0.5px;
        }

        h3 {
            font-size: 18px;
            font-weight: 800;
            color: var(--text-main);
            margin-bottom: 16px;
        }

        /* 🃏 アプリ風カードUI */
        .card {
            background: var(--card-bg);
            border-radius: var(--radius-md);
            padding: 20px;
            border: 1px solid var(--border);
            margin-bottom: 20px;
            box-shadow: var(--shadow-sm);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            box-shadow: var(--shadow-md);
            transform: translateY(-2px);
        }

        .card-header {
            font-weight: 800;
            font-size: 13px;
            margin-bottom: 15px;
            color: var(--text-mut);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* 📱 グリッドシステム */
        .grid-2 {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
        }

        .grid-3 {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 15px;
        }

        .grid-4 {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
        }

        /* 📊 ステータスボックス */
        .stat-box {
            background: #f8fafc;
            padding: 20px;
            border-radius: var(--radius-md);
            border: 1px solid var(--border);
            text-align: center;
            position: relative;
        }

        .stat-box .label {
            font-size: 12px;
            color: var(--text-mut);
            margin-bottom: 8px;
            font-weight: 700;
        }

        .stat-box .value {
            font-size: 24px;
            font-weight: 900;
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
        }

        /* 🔘 ボタンのモダン化 */
        button {
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
            font-size: 14px;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        button:active:not(:disabled) {
            transform: scale(0.97);
        }

        .btn-primary {
            background: var(--primary);
            color: #ffffff;
            box-shadow: 0 4px 10px rgba(37, 99, 235, 0.2);
        }

        .btn-primary:hover:not(:disabled) {
            background: var(--primary-hover);
            box-shadow: 0 6px 15px rgba(37, 99, 235, 0.3);
            transform: translateY(-1px);
        }

        .btn-danger {
            background: var(--danger);
            color: #ffffff;
            box-shadow: 0 4px 10px rgba(239, 68, 68, 0.2);
        }

        .btn-warning {
            background: var(--warning);
            color: #ffffff;
        }

        .btn-dark {
            background: var(--text-main);
            color: #ffffff;
        }

        .btn-outline {
            background: transparent;
            border: 2px solid var(--border);
            color: var(--text-mut);
        }

        .btn-outline:hover:not(:disabled) {
            border-color: var(--primary);
            color: var(--primary);
            background: #eff6ff;
        }

        .btn-large {
            width: 100%;
            padding: 16px;
            font-size: 16px;
        }

        /* 🎛️ 入力フォーム・スライダー */
        input[type="text"],
        input[type="number"],
        select {
            padding: 12px 16px;
            border: 2px solid var(--border);
            border-radius: 8px;
            width: 100%;
            box-sizing: border-box;
            font-family: inherit;
            font-size: 15px;
            font-weight: 600;
            color: var(--text-main);
            transition: border-color 0.2s;
            background: #f8fafc;
        }

        input:focus,
        select:focus {
            outline: none;
            border-color: var(--primary);
            background: #fff;
        }

        /* iOS風レンジスライダー */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 24px;
            width: 24px;
            border-radius: 50%;
            background: #ffffff;
            cursor: pointer;
            margin-top: -8px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
            border: 2px solid var(--primary);
        }

        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 8px;
            cursor: pointer;
            background: #e2e8f0;
            border-radius: 4px;
        }

        /* 📑 丸ピル型タブ */
        .region-tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 24px;
        }

        .tab-btn {
            background: #ffffff;
            border: 2px solid var(--border);
            padding: 10px 20px;
            border-radius: 30px;
            /* 完全な丸み */
            cursor: pointer;
            font-size: 14px;
            font-weight: 700;
            color: var(--text-mut);
            box-shadow: var(--shadow-sm);
        }

        .tab-btn.active {
            background: var(--primary);
            color: #ffffff;
            border-color: var(--primary);
            box-shadow: 0 4px 10px rgba(37, 99, 235, 0.3);
        }

        /* 🪟 グラスモーフィズム・モーダル */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(8px);
            /* すりガラス効果 */
            -webkit-backdrop-filter: blur(8px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            padding: 20px;
            animation: fadeIn 0.2s ease-out;
        }

        .modal-content {
            position: relative;
            background: var(--card-bg);
            width: 100%;
            max-width: 550px;
            padding: 30px;
            border-radius: var(--radius-lg);
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(40px) scale(0.98);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #f1f5f9;
            color: var(--text-mut);
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            margin: 0;
            transition: all 0.2s;
        }

        .close-btn:hover {
            background: #e2e8f0;
            color: var(--text-main);
            transform: rotate(90deg);
        }

        mobile-header {
            display: none;
        }

        /* 📱 スマホ完全対応レスポンシブ (ボトムナビ化) */
        @media (max-width: 800px) {
            body {
                flex-direction: column;
                overflow: visible !important;
                /* 画面全体の固定を解除 */
                height: auto !important;
                padding-bottom: 100px;
            }

            .main-content {
                overflow: visible !important;
                height: auto !important;
                padding: 10px;
            }

            /* ニュースとスタートアップが隠れないように調整 */
            #view-news,
            #view-vc {
                width: 100%;
                display: none;
                /* switchTabでactiveになった時だけ表示 */
            }

            #view-news.active,
            #view-vc.active {
                display: block !important;
            }

            .sidebar {
                width: 100%;
                display: none;
                /* スマホではヘッダー/ボトムナビに分解 */
            }

            /* スマホ用ヘッダー */
            .mobile-header {
                display: flex;
                justify-content: space-between;
                align-items: center;
                background: var(--side);
                color: white;
                padding: 15px 20px;
                position: sticky;
                top: 0;
                z-index: 100;
                box-shadow: var(--shadow-md);
            }

            .mobile-header .cash {
                font-size: 20px;
                font-weight: 900;
                color: #10b981;
            }

            .content-area {
                padding: 20px 15px;
                padding-bottom: 120px !important;
                overflow: visible;
            }

            /* スマホ用ボトムナビゲーション */
            .mobile-bottom-nav {
                position: fixed;
                bottom: 0;
                left: 0;
                right: 0;
                background: rgba(255, 255, 255, 0.9);
                backdrop-filter: blur(10px);
                -webkit-backdrop-filter: blur(10px);
                border-top: 1px solid var(--border);
                display: flex;
                justify-content: space-around;
                padding: 10px 5px 25px 5px;
                z-index: 1000;
                box-shadow: 0 -4px 10px rgba(0, 0, 0, 0.05);
            }

            .bottom-nav-item {
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 4px;
                font-size: 10px;
                font-weight: 700;
                color: var(--text-mut);
                padding: 8px;
                border-radius: 8px;
                width: 60px;
            }

            .bottom-nav-item.active {
                color: var(--primary);
                background: #eff6ff;
            }

            .bottom-nav-item .icon {
                font-size: 22px;
            }

            /* ターン進行フローティングボタン (FAB) */
            .btn-next-turn-fab {
                position: fixed;
                bottom: 90px;
                right: 20px;
                width: 64px;
                height: 64px;
                border-radius: 50%;
                background: var(--primary);
                color: white;
                font-size: 24px;
                display: flex;
                align-items: center;
                justify-content: center;
                box-shadow: 0 10px 25px rgba(37, 99, 235, 0.5);
                z-index: 999;
                transition: transform 0.2s;
            }

            .btn-next-turn-fab:active {
                transform: scale(0.9);
            }

            /* スマホ用カード調整 */
            .grid-2,
            .grid-3,
            .grid-4 {
                grid-template-columns: 1fr;
                gap: 15px;
            }

            .card {
                padding: 15px;
                margin-bottom: 15px;
            }

            h2 {
                font-size: 22px;
                margin-bottom: 15px;
            }
        }

        /* ユーティリティ */
        .text-success {
            color: var(--success) !important;
            font-weight: bold;
        }

        .text-danger {
            color: var(--danger) !important;
            font-weight: bold;
        }

        .flex-between {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        @media (min-width: 801px) {

            .mobile-header,
            .mobile-bottom-nav,
            .btn-next-turn-fab {
                display: none !important;
            }
        }
    </style>
</head>

<body>
    <div id="start-screen"
        style="position: fixed; inset: 0; background: linear-gradient(135deg, #0f172a, #1e293b); z-index: 999999; display: flex; flex-direction: column; justify-content: center; align-items: center; color: #fff;">
        <div style="text-align: center; max-width: 450px; padding: 20px; animation: appFadeIn 0.8s ease-out;">
            <h1 style="font-size: 36px; font-weight: 900; margin: 0 0 5px 0; letter-spacing: 2px;">Global M&A Sim</h1>
            <h2 style="font-size: 16px; font-weight: 800; color: var(--gold); margin: 0 0 40px 0; border: none;">CEO
                Edition</h2>

            <div
                style="margin-bottom: 30px; background: rgba(255, 255, 255, 0.05); padding: 25px; border-radius: var(--radius-lg); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1);">
                <label for="player-company-name-input"
                    style="display: block; margin-bottom: 12px; font-weight: 700; color: #cbd5e1; font-size: 14px;">🏢
                    設立する持株会社の名前</label>
                <input type="text" id="player-company-name-input" placeholder="例：カケル・ホールディングス" value="My Coffee Inc."
                    style="width: 100%; padding: 16px; border: 2px solid transparent; border-radius: 10px; font-size: 20px; text-align: center; color: var(--text-main); font-weight:900; background: #fff;">
            </div>

            <div style="display: flex; flex-direction: column; gap: 15px;">
                <button class="btn-primary" style="padding: 18px; font-size: 18px;" onclick="startNewGame()">🚀 会社を設立する
                    (NEW GAME)</button>
                <button class="btn-outline"
                    style="padding: 16px; font-size: 14px; border-color: rgba(255,255,255,0.2); color: #cbd5e1;"
                    onclick="openLoadFromStart()">💾 続きから (LOAD GAME)</button>
            </div>
        </div>
    </div>

    <div class="mobile-header">
        <div style="font-weight: 900; letter-spacing: 1px; font-size: 18px;">Global M&A</div>
        <div class="cash" id="mobile-disp-cash">¥---</div>
    </div>

    <div class="sidebar">
        <div class="sidebar-header">Global M&A Sim</div>
        <div class="nav-menu">
            <div class="nav-item active" id="nav-stores" onclick="switchTab('stores')"><span
                    style="font-size:18px;">🏪</span> 店舗・価格</div>
            <div class="nav-item" id="nav-world" onclick="switchTab('world')"><span style="font-size:18px;">🌍</span>
                不動産マップ</div>
            <div class="nav-item" id="nav-company" onclick="switchTab('company')"><span
                    style="font-size:18px;">📊</span> 財務・方針</div>
            <div class="nav-item" id="nav-hq" onclick="switchTab('hq')"><span style="font-size:18px;">🏢</span> 本社・R&D
            </div>
            <div class="nav-item" id="nav-subsidiaries" onclick="switchTab('subsidiaries')"><span
                    style="font-size:18px;">🤝</span> 子会社管理</div>
            <div class="nav-item" id="nav-market" onclick="switchTab('market')"><span style="font-size:18px;">📈</span>
                株式市場</div>
            <div class="nav-item" id="nav-vc" onclick="switchTab('vc')"><span style="font-size:18px;">🦄</span> スタートアップ
            </div>
            <div class="nav-item" id="nav-news" onclick="switchTab('news')"><span style="font-size:18px;">📰</span> ニュース
            </div>
        </div>
        <div class="company-summary">
            <div style="color: var(--side-text); font-size: 12px; margin-bottom: 4px; font-weight:700;">現在の時間</div>
            <div class="val" id="disp-week">2020年 1月 1週</div>
            <div
                style="color: var(--side-text); font-size: 12px; margin-bottom: 4px; margin-top: 15px; font-weight:700;">
                手元資金</div>
            <div class="val text-success" id="disp-cash">¥20,000,000</div>
        </div>
        <div class="sidebar-actions">
            <button class="btn-primary btn-large" style="margin-bottom: 15px; background: #3b82f6;"
                onclick="executeTurn()">⏭️ 翌週へ進む</button>
            <div style="display: flex; gap: 10px;">
                <button class="btn-outline"
                    style="flex: 1; padding: 10px; font-size: 12px; border-color: rgba(255,255,255,0.1); color: #cbd5e1;"
                    onclick="openSaveLoadModal('save')">💾 セーブ</button>
                <button class="btn-outline"
                    style="flex: 1; padding: 10px; font-size: 12px; border-color: rgba(255,255,255,0.1); color: #cbd5e1;"
                    onclick="openSaveLoadModal('load')">📂 ロード</button>
            </div>
        </div>
    </div>

    <div class="main-container">
        <div class="content-area" id="main-content-area">
            <div id="view-stores" class="view-section active"></div>
            <div id="view-world" class="view-section"></div>
            <div id="view-company" class="view-section"></div>
            <div id="view-hq" class="view-section"></div>
            <div id="view-subsidiaries" class="view-section"></div>
            <div id="view-market" class="view-section"></div>
            <div id="view-vc" class="view-section"></div>
            <div id="view-news" class="view-section"></div>
        </div>

        <div class="btn-next-turn-fab" onclick="executeTurn()" style="display: none;">⏭️</div>
        <<div class="mobile-bottom-nav">
            <div class="bottom-nav-item active" id="mob-nav-stores" onclick="switchTab('stores')">🏠<span>店舗</span>
            </div>
            <div class="bottom-nav-item" id="mob-nav-world" onclick="switchTab('world')">🌍<span>物件</span></div>
            <div class="bottom-nav-item" id="mob-nav-vc" onclick="switchTab('vc')">🦄<span>ベンチャー</span></div>
            <div class="bottom-nav-item" id="mob-nav-news" onclick="switchTab('news')">📰<span>ニュース</span></div>
            <div class="bottom-nav-item" id="mob-nav-hq" onclick="switchTab('hq')">🏢<span>HQ</span></div>
            <div class="bottom-nav-item" id="mob-nav-market" onclick="switchTab('market')">📈<span>市場</span></div>
    </div>
    </div>

    <div id="modals-area"></div>

    <script>
        // ==========================================
        // 🏗️ データ定義 ＆ 超絶データベース
        // ==========================================

            }
            get marketCap() { return this.stockPrice * this.shares; }

                let base = Math.max(1, this.stores.length) * 10000000 + 10000000;
                if (this.creditRating === "AAA") return base * 5;
                if (this.creditRating === "AA") return base * 3;
                if (this.creditRating === "A") return base * 2;
                if (this.creditRating === "C") return base * 0.5;

        // ==========================================
        // 👑 統合マスター版：ターン処理エンジン（executeTurn 前半）
        // ==========================================
        window.executeTurn = function () {
            if (isGameOver) return;
            week++;

            // 1. 株主比率の正規化
            companies.forEach(co => {
                if (!co || !co.shareholders || !co.shares) return;
                let total = 0;
                for (let id in co.shareholders) {
                    if (co.shareholders[id] < 0) co.shareholders[id] = 0;
                    if (co.shareholders[id] > co.shares) co.shareholders[id] = Math.floor(co.shares * 0.51);
                    total += co.shareholders[id];
                }
                if (total > co.shares && total > 0) {
                    const factor = co.shares / total;
                    for (let id in co.shareholders) co.shareholders[id] = Math.floor(co.shareholders[id] * factor);
                }
                if (co.shareholders['player'] === undefined) co.shareholders['player'] = 0;
            });

            // 2. マクロ環境の変動
            if (Math.random() < 0.05) {
                globalTaxRate = Math.random() > 0.5 ? 0.30 : 0.15;
                addLog(`【政治】法人税率が ${(globalTaxRate * 100).toFixed(0)}% に変更されました。`, globalTaxRate > 0.2 ? 'alert' : 'success', '政治');
            }
            if (playerLobbyBonusTurns > 0) playerLobbyBonusTurns--;

            // 3. 店長のレベルアップ処理（タレント・マトリックス）
            if (week % 12 === 0) {
                companies.forEach(c => {
                    c.stores.forEach(s => {
                        if (s.hasManager && s.managerLevel < 5) {
                            s.managerLevel++;
                            if (c.id === 'player') addLog(`【人事】${s.name} の店長がLv${s.managerLevel}にレベルアップしました！`, 'success', '自社');
                        }
                    });
                });
            }

            // 4. シナジー・マトリックス（異業種買収バフ）の計算
            let syn = { rent: 1.0, traffic: 1.0, margin: 1.0, hrCost: 1.0, rdCost: 1.0 };
            companies.filter(c => c.parent === 'player').forEach(c => {
                if (c.sector === 'realestate') syn.rent -= 0.05; // 家賃割引
                if (c.sector === 'game' || c.sector === 'media') syn.traffic += 0.05; // 集客力UP
                if (c.sector === 'auto' || c.sector === 'logistics') syn.margin += 0.05; // 輸送費削減による粗利UP
                if (c.sector === 'semiconductor' || c.sector === 'tech') syn.hrCost -= 0.05; // 店舗DXで人件費削減
                if (c.sector === 'food' || c.sector === 'pharma') syn.rdCost -= 0.10; // R&Dコスト削減
            });
            syn.rent = Math.max(0.5, syn.rent); syn.hrCost = Math.max(0.5, syn.hrCost); syn.rdCost = Math.max(0.3, syn.rdCost);

            // HQ役員バフ
            let coo = hiredExecs.find(e => e.role === 'COO'), cmo = hiredExecs.find(e => e.role === 'CMO'), cfo = hiredExecs.find(e => e.role === 'CFO'), cto = hiredExecs.find(e => e.role === 'CTO');
            let trafficMult = cmo ? (1.0 + (cmo.level * 0.08)) : 1.0;
            let appBonus = cto ? (0.15 + (cto.level * 0.05)) : 0.15;

            // 5. プロフィット・オプティマイザー ＆ 客の奪い合い
            let districtDemands = {};
            companies.forEach(c => {
                if (c.sector !== 'coffee' || c.isBankrupt) return;

                // メニュー解放による基礎ブランド力（イノベーション・ハブ）
                let unlockedBonus = c.unlockedMenus ? c.unlockedMenus.reduce((sum, mId) => {
                    let mData = coffeeMenus.find(m => m.id === mId);
                    return sum + (mData ? (mData.bonus - 1.0) : 0);
                }, 1.0) : 1.0;

                c.stores.forEach(s => {
                    if (!s.regionKey || !s.location) return;
                    let dKey = `${s.regionKey}_${s.location}`;
                    if (!districtDemands[dKey]) districtDemands[dKey] = { totalTraffic: 0, stores: [] };

                    let appeal = 100 * unlockedBonus;

                    // 店長バフの適用
                    let mgrTrafficBonus = 1.0;
                    if (s.hasManager && s.managerData) {
                        mgrTrafficBonus = s.managerData.bonus.traffic + (s.managerLevel * 0.02);
                    }
                    appeal *= mgrTrafficBonus;

                    // 価格弾力性（プロフィット・オプティマイザー）の計算
                    let price = s.price || 500;
                    let priceRatio = price / 500;
                    // 価格が高いほど魅力度が下がるが、ブランド力(unlockedBonus)が高いと許容される
                    let elasticity = Math.max(0.1, 1.0 - ((priceRatio - 1.0) * (2.0 / unlockedBonus)));
                    appeal *= elasticity;

                    if (c.id === 'player') {
                        if (techMarketing) appeal *= 1.3;
                        if (techApp) appeal *= (1.0 + appBonus);
                        appeal *= trafficMult * syn.traffic;
                    } else {
                        // AIのブランド力（時価総額依存）
                        appeal *= (1.0 + (c.marketCap / 500000000));
                    }

                    // 店舗密集ボーナス
                    let densityBonus = c.stores.filter(st => st.regionKey === s.regionKey && st.location === s.location).length;
                    appeal *= (1.0 + (densityBonus * 0.05));

                    s.tempAppeal = appeal;
                    districtDemands[dKey].totalTraffic += s.traffic;
                    districtDemands[dKey].stores.push({ store: s, compId: c.id });
                });
            });

            // シェア分配
            Object.keys(districtDemands).forEach(dKey => {
                let dInfo = districtDemands[dKey];
                let totalAppeal = dInfo.stores.reduce((sum, item) => sum + item.store.tempAppeal, 0);
                dInfo.stores.forEach(item => {
                    let share = totalAppeal > 0 ? item.store.tempAppeal / totalAppeal : 0;
                    item.store.contestedTraffic = Math.floor(dInfo.totalTraffic * share);
                });
            });

            // 6. 収益計算 ＆ 経費引き落とし
            let p = companies[0], pRev = 0, pExp = 0, pDiv = 0, pTax = 0, pNet = 0, pPropInc = 0;
            let trend = Math.sin(week / 5) * 0.02;

            companies.forEach(c => {
                if (c.isBankrupt) return;
                let prof = 0;

                if (c.type === 'player' || c.type === 'ai') {
                    c.stores.forEach(s => {
                        let finalTraffic = s.contestedTraffic || s.traffic;
                        let rent = s.rent;

                        // 自社物件チェック
                        const d = globalNetworkData[s.regionKey]?.districts.find(dx => dx.name === s.location);
                        if (d && d.properties[s.propIndex]?.owner === c.id) {
                            rent = 0;
                        } else if (c.id === 'player') {
                            let cooRentDisc = coo ? (coo.level * 0.05) : 0;
                            rent = Math.floor(rent * (1.0 - cooRentDisc) * syn.rent);
                        }

                        // 売上計算（客数 × 設定価格）
                        let price = s.price || 500;
                        let rev = Math.floor(finalTraffic * price * (Math.random() * 0.2 + 0.9));

                        // 人件費の計算
                        let baseSalary = 50000 * s.staffCount;
                        if (s.hasManager && s.managerData) baseSalary += s.managerData.baseSalary;
                        if (c.id === 'player') baseSalary = Math.floor(baseSalary * syn.hrCost);

                        let sp = rev - rent - baseSalary;
                        s.sales = rev;
                        s.customers = finalTraffic;

                        if (c.id === 'player') {
                            let mgrMarginBonus = (s.hasManager && s.managerData) ? (s.managerData.bonus.margin + (s.managerLevel * 0.02)) : 1.0;
                            if (techRoaster && sp > 0) sp *= 1.2;
                            sp *= (syn.margin * mgrMarginBonus);

                            pRev += rev;
                            pExp += (rent + baseSalary);
                        }
                        prof += sp;
                    });
                } else {
                    prof = Math.floor(c.marketCap * 0.003 * (1 + (Math.random() * 0.6 - 0.3)));
                }

                // 共通経費（負債利子・HQ維持費）
                let commonExp = Math.floor(c.debt * (c.id === 'player' && cfo ? 0.008 : 0.01));
                if (c.id === 'player') {
                    if (hqLevel > 0) {
                        commonExp += [1000000, 3000000, 6000000, 10000000, 20000000][hqLevel - 1] || 1000000;
                        if (playerHQ && playerHQ.isRented) {
                            commonExp += playerHQ.rent;
                            if (playerHQ.owner && playerHQ.owner !== 'player') {
                                let ownerCo = companies.find(oc => oc.id === playerHQ.owner);
                                if (ownerCo) ownerCo.cash += playerHQ.rent;
                            }
                        }
                    }
                    if (techMarketing) commonExp += 3000000;
                    pExp += commonExp;
                }

                prof -= commonExp;
                c.cash += prof;
                c.qNet = (c.qNet || 0) + prof;

                if (c.id === 'player') {
                    pNet = pRev - pExp;
                    let currentTaxRate = Math.max(0, (playerLobbyBonusTurns > 0 ? 0.10 : globalTaxRate) - (cfo ? cfo.level * 0.05 : 0));
                    pTax = Math.max(0, Math.floor(pNet * currentTaxRate));
                    pNet -= pTax;
                }
                // --- 7. アダプティブ・ライバル・エンジン ＆ インダストリー・コヒーレンス ---
                // --- 🤖 アグレッシブ版：AIのM&A・株式投資ロジック ---
                if (c.id !== 'player' && c.isPublic && c.cash > 50000000 && !c.isBankrupt) {
                    let targets = companies.filter(t => t.id !== c.id && t.isPublic && !t.isBankrupt && t.parent !== c.id);
                    if (targets.length > 0) {
                        let target = targets.sort(() => 0.5 - Math.random())[0];
                        const isSecurities = (c.sector === 'finance' || c.sector === 'securities');
                        const sameIndustry = (c.sector === target.sector) || (c.sector === 'coffee' && target.sector === 'food') || (c.sector === 'food' && target.sector === 'coffee');
                        const verticalIntegration = (target.sector === 'semiconductor') && (c.sector === 'auto' || c.sector === 'space');
                        let currentShares = target.shareholders[c.id] || 0;

                        if (isSecurities || sameIndustry || verticalIntegration) {
                            // 🏢 TOBの確率を大幅アップ (15%)
                            if (!target.activeTOB && Math.random() < 0.15) {
                                let premiumPrice = Math.floor(target.stockPrice * 1.3), targetShares = Math.floor(target.shares * 0.51) + 1, sharesToBuy = Math.max(0, targetShares - currentShares), totalCost = premiumPrice * sharesToBuy;
                                if (sharesToBuy > 0 && c.cash >= totalCost * 1.1) {
                                    target.activeTOB = { bidder: c.id, price: premiumPrice, targetShares: sharesToBuy, startWeek: week, deadline: week + 2 };
                                    addLog(`【TOB開始】${c.name.replace(/\[.*?\]\s*/, '')} が ${target.name.replace(/\[.*?\]\s*/, '')} に敵対的TOBを宣言！`, 'alert', 'M&A');
                                    target.stockPrice = premiumPrice;
                                }
                            }
                            // 市場でガンガン株を買い集める (40%)
                            else if (currentShares < Math.floor(target.shares * 0.49) && Math.random() < 0.4) {
                                let maxBuyShares = Math.floor(target.shares * (Math.random() * 0.1 + 0.05)), limit = Math.floor(target.shares * 0.49) - currentShares, sharesToBuy = Math.min(Math.floor((c.cash * 0.3) / target.stockPrice), maxBuyShares, limit);
                                if (sharesToBuy > 100) { c.cash -= sharesToBuy * target.stockPrice; target.shareholders[c.id] = currentShares + sharesToBuy; }
                            }
                        } else {
                            // 異業種への純投資も活発化 (25%)
                            if (currentShares < Math.floor(target.shares * 0.30) && Math.random() < 0.25) {
                                let maxBuyShares = Math.floor(target.shares * (Math.random() * 0.05 + 0.02)), sharesToBuy = Math.min(Math.floor((c.cash * 0.15) / target.stockPrice), maxBuyShares);
                                if (sharesToBuy > 100) { c.cash -= sharesToBuy * target.stockPrice; target.shareholders[c.id] = currentShares + sharesToBuy; }
                            }
                        }
                    }

                    // 🛡️ 防衛策（ポイズンピル等）
                    if (!c.lastDilutionWeek || (week - c.lastDilutionWeek) >= 48) {
                        if (c.activeTOB && Math.random() < 0.3) {
                            addLog(`【防衛】${c.name.replace(/\[.*?\]\s*/, '')}が買収への対抗措置として新株発行(ポイズンピル)を強行！`, 'alert', 'M&A');
                            if (typeof executeCompanyDilution === 'function') executeCompanyDilution(c, 20);
                        } else if (c.cash < 5000000 && c.stockPrice > 1000 && Math.random() < 0.05) {
                            if (typeof executeCompanyDilution === 'function') executeCompanyDilution(c, 10);
                        }
                    }
                }

                // 🤖 AIのメニュー開発(R&D)と価格競争
                if (c.id !== 'player' && c.sector === 'coffee' && !c.isBankrupt) {
                    let nextMenu = coffeeMenus.find(m => !c.unlockedMenus.includes(m.id));
                    if (nextMenu && c.cash > nextMenu.cost * 3 && Math.random() < 0.1) {
                        c.cash -= nextMenu.cost;
                        c.unlockedMenus.push(nextMenu.id);
                        if (Math.random() < 0.05) addLog(`【競合動向】${c.name.replace(/\[.*?\]\s*/, '')}が新メニュー「${nextMenu.name}」を開発！`, 'alert', '店舗');
                    }

                    if (c.cash > 20000000 && Math.random() < 0.2) {
                        let props = [];
                        Object.keys(globalNetworkData).forEach(rk => {
                            globalNetworkData[rk].districts.forEach(dist => {
                                dist.properties.forEach((prop, idx) => { if (prop.coffeeTenant === null) props.push({ rk, distName: dist.name, prop, idx }); });
                            });
                        });
                        let target = props.length > 0 ? props[Math.floor(Math.random() * props.length)] : null;
                        if (target) {
                            let cost = target.prop.rent * 4;
                            if (c.cash - cost > 10000000) {
                                c.cash -= cost; target.prop.coffeeTenant = 2;
                                let s = new Store(`[${target.distName}] ${target.prop.type}`, target.prop.rent, target.prop.traffic, target.prop.owner, target.prop.id, target.rk, target.distName, target.idx);
                                // AI店長ガチャ
                                if (Math.random() < 0.2) { s.hasManager = true; s.managerData = managerTypes[Math.floor(Math.random() * managerTypes.length)]; }

                                // 📉 ダイナミックプライシング（プレイヤーと同地区なら安くする）
                                let playerStore = companies[0].stores.find(ps => ps.location === s.location);
                                s.price = playerStore ? Math.max(300, playerStore.price - 50) : 550;
                                c.stores.push(s);
                            }
                        }
                    }
                }

                // 株価変動
                c.stockPrice = Math.max(10, Math.floor(c.stockPrice * (1.0 + trend + (prof > 0 ? 0.015 : -0.015))));
            });

            // 8. プレイヤー配当金の受け取り ＆ ゲームオーバー判定
            playerTotalDividends += pDiv; p.cash += pDiv;
            if (Object.keys(p.shareholders).filter(k => k !== 'player').reduce((s, k) => s + p.shareholders[k], 0) >= p.shares / 2) {
                isGameOver = true; alert("【GAME OVER】株式の過半数を買収され、会社を乗っ取られました。");
            }
            if (companies.filter(c => c.sector === 'coffee' && c.id !== 'player' && !c.isBankrupt).length < 4 && typeof spawnAI === 'function') spawnAI(false);

            // 9. 不動産価値変動 ＆ 家賃徴収
            let cashBeforeProp = p.cash;
            let marketEvent = null;
            if (Math.random() < 0.08) {
                marketEvent = realEstateEvents[Math.floor(Math.random() * realEstateEvents.length)];
                const rKeys = Object.keys(globalNetworkData);
                marketEvent.targetCity = (marketEvent.scope === "single") ? rKeys[Math.floor(Math.random() * rKeys.length)] : null;
                let targetName = marketEvent.targetCity ? globalNetworkData[marketEvent.targetCity].name : '全世界';
                addLog(`【世界情勢】${marketEvent.n}：${targetName}で${marketEvent.msg}`, marketEvent.type, "経済");
                if (typeof showMarketAlert === 'function') showMarketAlert(marketEvent.n, targetName, marketEvent.msg, marketEvent.type);
            }

            Object.keys(globalNetworkData).forEach(rk => {
                globalNetworkData[rk].districts.forEach(d => {
                    d.properties.forEach(prop => {
                        if (!prop.currentValue) prop.currentValue = prop.rent * 500;
                        let fluctuation = 1 + (Math.random() * 0.04 - 0.02);
                        if (marketEvent && (marketEvent.scope === "global" || rk === marketEvent.targetCity)) {
                            fluctuation *= marketEvent.v; prop.rent = Math.floor(prop.rent * marketEvent.r);
                        }
                        prop.currentValue = Math.floor(prop.currentValue * fluctuation);

                        if (!prop.owner) return;
                        let ownerCo = companies.find(c => c.id === prop.owner);
                        if (!ownerCo) return;
                        // コーヒーテナントからの家賃
                        if (prop.coffeeTenant !== null && prop.coffeeTenant !== 1) ownerCo.cash += prop.rent;
                        // NPCテナントからの家賃
                        if (prop.npcSlots > 0) {
                            if (!prop.tenantList) prop.tenantList = [];
                            if (prop.occupiedNPCSlots < prop.npcSlots && Math.random() < 0.1) {
                                prop.occupiedNPCSlots++;
                                const npcCos = companies.filter(c => c.id !== 'player' && c.sector !== 'coffee');
                                if (npcCos.length > 0) {
                                    const newTenant = npcCos[Math.floor(Math.random() * npcCos.length)];
                                    const cleanName = newTenant.name.replace(/\[.*?\]\s*/, '');
                                    prop.tenantList.push(cleanName);
                                    if (prop.owner === 'player') addLog(`【不動産】あなたのビルに ${cleanName} がオフィスを開設！`, 'success', '不動産');
                                }
                            }
                            ownerCo.cash += Math.floor(prop.rent * 0.5 * prop.occupiedNPCSlots);
                        }
                    });
                });
            });

            ownedProperties.forEach(op => {
                if (op.rk && op.idx !== undefined) {
                    let mapProp = globalNetworkData[op.rk].districts.find(d => d.name === op.distName)?.properties[op.idx];
                    if (mapProp) { op.currentValue = mapProp.currentValue; op.rent = mapProp.rent; }
                }
            });
            pPropInc = p.cash - cashBeforeProp;

            // 10. TOB決着（AIの高値掴み断念ロジック）
            companies.forEach(c => {
                if (c.activeTOB && (week - c.activeTOB.startWeek) >= 2) {
                    let tob = c.activeTOB;
                    let bidderCo = companies.find(x => x.id === tob.bidder);
                    if (!bidderCo) return delete c.activeTOB;

                    let currentNeeded = Math.ceil(c.shares * 0.51) - (c.shareholders[tob.bidder] || 0);
                    let finalCost = tob.price * currentNeeded;
                    let initialCost = tob.price * tob.targetShares;

                    // AIの慎重ロジック
                    if (tob.bidder !== 'player') {
                        let costIncrease = finalCost / initialCost;
                        let cashRatioAfter = (bidderCo.cash - finalCost) / bidderCo.cash;
                        if ((costIncrease > 1.3 || cashRatioAfter < 0.15) && Math.random() < 0.7) {
                            addLog(`【TOB断念】${bidderCo.name} は高騰により ${c.name.replace(/\[.*?\]\s*/, '')} の買収を中止。`, 'normal', 'M&A');
                            delete c.activeTOB;
                            return;
                        }
                    }

                    if (tob.bidder === 'player') {
                        const reportMsg = `【TOB最終決断：${c.name.replace(/\[.*?\]\s*/, '')}】\n\n・最終買付数: ${currentNeeded.toLocaleString()} 株\n・最終買収額: ¥${finalCost.toLocaleString()}\n\nこの金額を支払い、子会社化を完了させますか？`;
                        if (confirm(reportMsg)) {
                            if (companies[0].cash >= finalCost) {
                                companies[0].cash -= finalCost;
                                c.shareholders['player'] = (c.shareholders['player'] || 0) + currentNeeded;
                                c.playerTotalCost += finalCost;
                                c.parent = 'player';
                                c.name = `[自社傘下] ${c.name.replace(/\[.*?\]\s*/, '')}`;
                                addLog(`【成功】買収完了！`, 'success', 'M&A');
                            } else { alert("資金不足です！"); }
                        }
                    } else {
                        if (bidderCo.cash >= finalCost) {
                            bidderCo.cash -= finalCost;
                            c.shareholders[tob.bidder] = (c.shareholders[tob.bidder] || 0) + currentNeeded;
                            c.parent = bidderCo.id;
                            addLog(`【M&A】${bidderCo.name} が ${c.name.replace(/\[.*?\]\s*/, '')} を買収しました。`, 'alert', 'M&A');
                        }
                    }
                    delete c.activeTOB;
                }
            });

            // 11. 週間決算の算出
            let currentProfit = pNet + pDiv + pPropInc + (window.weeklyStockSaleProfit || 0) + (window.weeklySiphonedCash || 0);

            // 【UI描画・決算モーダルの呼び出し等は次のパート（UI編）へ続きます】
            // --- 12. 週間決算モーダルの描画（グラスモーフィズムUI） ---
            let modalsArea = document.getElementById('modals-area');
            let summaryModal = document.getElementById('summary-modal');

            if (!summaryModal && modalsArea) {
                modalsArea.insertAdjacentHTML('beforeend', `
                    <div id="summary-modal" class="modal-overlay">
                        <div class="modal-content" style="max-width: 450px; background: rgba(255,255,255,0.95);">
                            <button class="close-btn" onclick="closeModal('summary-modal'); updateDashboard();">✕</button>
                            <div style="text-align:center; margin-bottom: 20px;">
                                <div style="font-size:12px; color:var(--text-mut); font-weight:800; letter-spacing:1px; text-transform:uppercase;">Weekly Financial Report</div>
                                <h3 style="margin:5px 0 0 0; font-size:22px; color:var(--text-main);"><span id="modal-week"></span> 決算</h3>
                            </div>
                            
                            <div style="background:#f8fafc; border-radius:12px; padding:15px; border:1px solid var(--border); margin-bottom:15px; font-size:14px;">
                                <div class="flex-between" style="margin-bottom:10px;"><span>☕ 店舗売上・粗利</span><span id="modal-store-profit" style="font-weight:900;">¥0</span></div>
                                <div class="flex-between" style="margin-bottom:10px; color:var(--danger);"><span>🏢 経費 (給料/HQ/利息)</span><span id="modal-store-exp" style="font-weight:700;">-¥0</span></div>
                                <div class="flex-between" style="margin-bottom:10px;"><span>🏢 不動産家賃収入</span><span id="modal-prop-income" class="text-success">+¥0</span></div>
                                <div class="flex-between" style="margin-bottom:10px;"><span>💰 受取配当金</span><span id="modal-dividend" class="text-success">+¥0</span></div>
                                <div class="flex-between" style="margin-bottom:10px;"><span>📈 株式売却益</span><span id="modal-stock-profit" class="text-success">+¥0</span></div>
                                <div class="flex-between"><span>💸 子会社送金</span><span id="modal-siphon-profit" class="text-success">+¥0</span></div>
                            </div>
                            
                            <div style="padding:0 10px;">
                                <div class="flex-between" style="margin-bottom:10px; font-size:14px; color:var(--text-mut);">
                                    <span>税引前利益</span><span id="modal-pre-tax" style="font-weight:bold;">¥0</span>
                                </div>
                                <div class="flex-between" style="margin-bottom:15px; font-size:14px; color:var(--danger);">
                                    <span>⚖️ 法人税等</span><span id="modal-tax" style="font-weight:bold;">-¥0</span>
                                </div>
                            </div>
                            
                            <div style="background: linear-gradient(135deg, #1e293b, #0f172a); color:white; border-radius:12px; padding:20px; text-align:center; position:relative; overflow:hidden;">
                                <div style="font-size:13px; opacity:0.8; margin-bottom:5px; font-weight:700;">最終純利益 (Net Profit)</div>
                                <div id="modal-profit" style="font-size:32px; font-weight:900; font-family:'Inter', sans-serif;">¥0</div>
                                <div id="modal-profit-comparison" style="position:absolute; top:15px; right:15px; font-size:12px; font-weight:bold; background:rgba(255,255,255,0.1); padding:4px 8px; border-radius:20px;"></div>
                            </div>

                            <div style="width: 100%; height: 160px; margin: 20px 0;"><canvas id="stockChart"></canvas></div>
                            <button class="btn-primary btn-large" style="border-radius:12px;" onclick="closeModal('summary-modal'); updateDashboard();">確認して進む</button>
                        </div>
                    </div>
                `);
                summaryModal = document.getElementById('summary-modal');
            }

            if (summaryModal) {
                document.getElementById('modal-week').innerText = `${2020 + Math.floor((week - 2) / 48)}年 ${Math.floor(((week - 2) % 48) / 4) + 1}月 ${((week - 2) % 4) + 1}週`;

                document.getElementById('modal-store-profit').innerText = '¥' + pRev.toLocaleString();
                document.getElementById('modal-store-exp').innerText = `-¥${pExp.toLocaleString()}`;
                document.getElementById('modal-prop-income').innerText = `+¥${pPropInc.toLocaleString()}`;
                document.getElementById('modal-dividend').innerText = `+¥${pDiv.toLocaleString()}`;
                document.getElementById('modal-stock-profit').innerText = `+¥${Math.floor(window.weeklyStockSaleProfit || 0).toLocaleString()}`;
                document.getElementById('modal-siphon-profit').innerText = `+¥${Math.floor(window.weeklySiphonedCash || 0).toLocaleString()}`;

                let preTax = (pRev - pExp) + pDiv + pPropInc + (window.weeklyStockSaleProfit || 0) + (window.weeklySiphonedCash || 0);
                document.getElementById('modal-pre-tax').innerText = `¥${preTax.toLocaleString()}`;
                document.getElementById('modal-tax').innerText = `-¥${pTax.toLocaleString()}`;

                let elProf = document.getElementById('modal-profit');
                elProf.innerText = `¥${currentProfit.toLocaleString()}`;
                elProf.style.color = currentProfit >= 0 ? '#34d399' : '#f87171';

                let diff = currentProfit - window.playerPreviousProfit;
                let compText = window.playerPreviousProfit === 0 ? (currentProfit >= 0 ? "+100.0%" : "-100.0%") : `${diff >= 0 ? '+' : ''}${((diff / Math.abs(window.playerPreviousProfit)) * 100).toFixed(1)}%`;
                document.getElementById('modal-profit-comparison').innerHTML = `${diff > 0 ? '↗' : '↘'} ${compText}`;
                document.getElementById('modal-profit-comparison').style.color = diff > 0 ? '#34d399' : '#f87171';

                window.weeklyStockSaleProfit = 0; window.weeklySiphonedCash = 0;
                summaryModal.style.display = 'flex';

                // 株価チャートの更新
                window.stockPriceHistory = window.stockPriceHistory || [companies[0].stockPrice];
                window.stockPriceHistory.push(companies[0].stockPrice);
                if (typeof updateCharts === 'function') updateCharts();
            }

            window.playerPreviousProfit = currentProfit;
            updateDashboard();
            renderNewspaper();

            // 週刊M&Aジャーナルの号外ポップアップ
            let thisWeekStr = `${2020 + Math.floor((week - 2) / 48)}年 ${Math.floor(((week - 2) % 48) / 4) + 1}月 ${((week - 2) % 4) + 1}週`;
            let weeklyNews = window.logHistory.filter(l => l.week === thisWeekStr);
            if (weeklyNews.length > 0) {
                let newsList = weeklyNews.map(n => `<div style="margin-bottom:10px; padding-bottom:10px; border-bottom:1px solid var(--border);"><span style="background:var(--text-main); color:#fff; font-size:10px; padding:2px 6px; border-radius:4px; margin-right:6px;">${n.category}</span><span style="font-size:13px; font-weight:600; color:var(--text-main);">${n.msg}</span></div>`).join('');
                showMarketAlert("📰 週刊 M&A ジャーナル", "通常版", `<div style="max-height:300px; overflow-y:auto; padding-right:5px;">${newsList}</div>`, "news");
            }

            // --- 13. 四半期決算（12週ごと） ＆ 配当金処理 ---
            if (week > 1 && (week - 1) % 12 === 0) {
                companies.forEach(c => {
                    c.prevQProfit = c.lastQProfit || 0;
                    c.lastQProfit = c.qNet || 0;
                    c.qNet = 0;

                    // 配当性向に基づき配当を分配
                    if (c.lastQProfit > 0 && c.dividendRate > 0) {
                        let totalDiv = Math.floor(c.lastQProfit * (c.dividendRate / 100));
                        c.lastDividendPerShare = Math.floor(totalDiv / c.shares);

                        if (c.lastDividendPerShare > 0) {
                            for (let invId in c.shareholders) {
                                let sharesOwned = c.shareholders[invId];
                                if (sharesOwned > 0) {
                                    let payout = sharesOwned * c.lastDividendPerShare;
                                    if (invId === 'player') {
                                        companies[0].cash += payout;
                                        playerTotalDividends += payout;
                                        addLog(`【配当金】${c.name.replace(/\[.*?\]\s*/, '')} から配当金 ¥${payout.toLocaleString()} を受領しました。`, 'success', '自社');
                                    } else {
                                        let invCo = companies.find(x => x.id === invId);
                                        if (invCo) invCo.cash += payout;
                                    }
                                }
                            }
                            c.cash -= (c.lastDividendPerShare * c.shares);
                        } else { c.lastDividendPerShare = 0; }
                    } else { c.lastDividendPerShare = 0; }
                });

                setTimeout(() => {
                    if (typeof showQuarterlyReport === 'function') showQuarterlyReport(1);
                }, 1500);
            }
        }; // --- executeTurn ここで完全終了 ---


        // ==========================================
        // 🏪 店舗管理UI（タレント・マトリックス ＆ プロフィット・オプティマイザー統合）
        // ==========================================
        // ==========================================
        // 🏪 店舗管理UI（敵の店舗も見られる決定版）

        window.currentStoreViewId = 'player'; // 選択状態を保存する変数

                p.cash -= hireCost;

                let mType = managerTypes[Math.floor(Math.random() * managerTypes.length)];

            let targetMenus = coffeeMenus.filter(m => m.type === window.currentRndCategory);

        };
        window.developMenu = function (mId) {

                                    <div style="text-align:right;"><div style="font-size:11px; color:var(--text-mut); font-weight:bold;">保有株 (平均単価)</div><div style="font-size:18px; font-weight:900;"><span id="trade-owned-shares">0</span> <span id="trade-avg-cost" style="font-size:11px; color:var(--text-mut); font-weight:normal;">(¥0)</span></div></div>

            document.getElementById('btn-trade-sell-mode').className = m === 'sell' ? 'btn-danger' : 'btn-outline';

        };

        window.calcTrade = function () { document.getElementById('trade-estimate-total').innerText = `¥${(companies.find(x => x.id === tradingCompanyId).stockPrice * (parseInt(document.getElementById('trade-amount').value) || 0)).toLocaleString()}`; };

        window.setTradeMax = function () {
            let c = companies.find(x => x.id === tradingCompanyId), p = companies[0];
            if (tradeMode === 'buy') {
                let avail = Math.max(0, c.shares - Object.values(c.shareholders).reduce((x, y) => x + y, 0));
                document.getElementById('trade-amount').value = Math.min(avail, Math.floor(p.cash / c.stockPrice));
            } else { document.getElementById('trade-amount').value = c.shareholders['player'] || 0; }
            calcTrade();
        };

        window.executeTrade = function () {
            let a = parseInt(document.getElementById('trade-amount').value), c = companies.find(x => x.id === tradingCompanyId), p = companies[0], cost = c.stockPrice * a;
            if (isNaN(a) || a <= 0) return;
            if (tradeMode === 'buy') {
                if (p.cash < cost) return alert("資金不足です！");
                if (Object.values(c.shareholders).reduce((x, y) => x + y, 0) + a > c.shares) return alert("市場に出回っている株が不足しています。");

                let currentOwned = c.shareholders['player'] || 0;
                let newRatio = (currentOwned + a) / c.shares;
                // 市場直接買付は40%未満に制限
                if (newRatio >= 0.40 && c.id !== 'player') return alert("【法規制】市場での直接買付は発行済株式の40%未満に制限されています。\n過半数を取得して買収するには「TOB (公開買付)」を宣言してください。");

                p.cash -= cost; c.shareholders['player'] = currentOwned + a; c.playerTotalCost += cost;
                addLog(`市場で ${c.name.replace(/\[.*?\]\s*/, '')} を ${a.toLocaleString()}株 購入しました。`, 'normal', 'M&A');
            } else {
                let o = c.shareholders['player'] || 0; if (o < a) return alert("保有株数が不足しています。");
                let profitPerShare = c.stockPrice - (c.playerTotalCost / o);
                window.weeklyStockSaleProfit = (window.weeklyStockSaleProfit || 0) + (profitPerShare * a);

                p.cash += cost; c.playerTotalCost -= (c.playerTotalCost / o) * a; c.shareholders['player'] -= a;
                if (c.shareholders['player'] === 0) c.playerTotalCost = 0;
                addLog(`保有する ${c.name.replace(/\[.*?\]\s*/, '')} を ${a.toLocaleString()}株 売却しました。`, 'normal', 'M&A');
            }
            closeModal('trade-modal'); updateDashboard(); renderPortfolio();
        };

        window.declareTOB = function () {
            let c = companies.find(x => x.id === tradingCompanyId), p = companies[0];
            if (c.parent === 'player') return alert("すでに自社の子会社です。");
            if (c.id === 'player') return;

            let premiumPrice = Math.floor(c.stockPrice * 1.3), targetShares = Math.floor(c.shares * 0.51) + 1;
            let sharesToBuy = Math.max(0, targetShares - (c.shareholders['player'] || 0));

            if (sharesToBuy === 0) {
                c.parent = 'player';
                addLog(`【買収完了】${c.name.replace(/\[.*?\]\s*/, '')} を子会社化しました！`, 'success', 'M&A');
                closeModal('trade-modal'); updateDashboard(); return;
            }

            if (confirm(`【TOB宣言】\n${c.name.replace(/\[.*?\]\s*/, '')} を プレミアム価格 ¥${premiumPrice.toLocaleString()}/株 で公開買付します。\n\n予想買収総額: 約 ¥${(premiumPrice * sharesToBuy).toLocaleString()}\n※買収は「2週間後」に確定します。相手がポイズンピル（新株発行）で抵抗するリスクがあります。\nよろしいですか？`)) {
                c.activeTOB = { bidder: 'player', price: premiumPrice, targetShares: sharesToBuy, startWeek: week, deadline: week + 2 };
                addLog(`【TOB開始】自社が ${c.name.replace(/\[.*?\]\s*/, '')} に対して敵対的TOBを宣言！（決着まで2週）`, 'alert', 'M&A');
                c.stockPrice = premiumPrice;
                closeModal('trade-modal'); updateDashboard();
            }
        };

        // ==========================================
        // 🌟 新機能ロジック：融資実行 と DES（株式転換）
        // ==========================================
        window.executeLending = function () {
            let c = companies.find(x => x.id === window.tradingCompanyId), p = companies[0];
            let amt = parseInt(document.getElementById('loan-amount-input').value) * 10000;
            if (isNaN(amt) || amt <= 0) return alert("正しい金額を入力してください。");
            if (p.cash < amt) return alert("資金が不足しています！");

            if (confirm(`${c.name.replace(/\[.*?\]\s*/, '')} に対して ¥${(amt / 10000).toLocaleString()}万 を融資しますか？\n（毎週1%の利息が自動で手に入ります）`)) {
                p.cash -= amt;
                c.cash += amt;
                c.debtToPlayer = (c.debtToPlayer || 0) + amt; // 借金残高を増やす
                addLog(`【融資】${c.name.replace(/\[.*?\]\s*/, '')} に ¥${(amt / 10000).toLocaleString()}万 を貸し付けました。`, 'success', '経済');
                closeModal('trade-modal'); updateDashboard();
            }
        };

        window.executeDebtEquitySwap = function () {
            let c = companies.find(x => x.id === window.tradingCompanyId), p = companies[0];
            let debt = c.debtToPlayer || 0;
            if (debt <= 0) return;

            // 20%ディスカウントで株式を強制発行させる
            let swapPrice = Math.max(10, Math.floor(c.stockPrice * 0.8));
            let sharesToGet = Math.floor(debt / swapPrice);

            if (confirm(`【デット・エクイティ・スワップ (DES) 実行】\n貸付残高 ¥${debt.toLocaleString()} を放棄し、代わりに相手の株式を取得します。\n\n転換価格: ¥${swapPrice.toLocaleString()} (市場の20%引)\n取得株数: ${sharesToGet.toLocaleString()} 株\n\n本当に実行しますか？`)) {
                c.debtToPlayer = 0; // 借金帳消し
                c.shares += sharesToGet; // 新株発行（相手の株が希薄化）
                c.shareholders['player'] = (c.shareholders['player'] || 0) + sharesToGet; // あなたの持株が増える
                c.playerTotalCost += debt;

                // 新株発行により株価が下がる
                c.stockPrice = Math.max(10, Math.floor(c.marketCap / c.shares));

                addLog(`【DES実行】債権を株式に転換し、${c.name.replace(/\[.*?\]\s*/, '')} の株式 ${sharesToGet.toLocaleString()} 株を取得しました！`, 'alert', 'M&A');

                // もし過半数を握ったら子会社化
                if (c.shareholders['player'] > c.shares * 0.5) {
                    c.parent = 'player';
                    c.name = `[自社傘下] ${c.name.replace(/\[.*?\]\s*/, '')}`;
                    addLog(`【支配】過半数の株式を取得し、子会社化しました！`, 'success', 'M&A');
                }
                closeModal('trade-modal'); updateDashboard(); updateMarket();
            }
        };

        // 💸 ターン終了時に「利息」を自動でむしり取るフック処理
        if (!window.originalExecuteTurn_Bank) {
            window.originalExecuteTurn_Bank = window.executeTurn;
            window.executeTurn = function () {
                window.originalExecuteTurn_Bank(); // 元のターン処理を実行

                let totalInterest = 0;
                companies.forEach(c => {

                    if (c.id !== 'player' && c.debtToPlayer > 0) {
                        let interest = Math.floor(c.debtToPlayer * 0.01);
                        c.cash -= interest;
                        companies[0].cash += interest;
                        totalInterest += interest;
                    }
                });
                if (totalInterest > 0) {
                    addLog(`【融資利息】債務企業から総額 ¥${totalInterest.toLocaleString()} の利息を自動徴収しました。`, 'success', '経済');

                        <td style="text-align:right; padding:15px 12px; vertical-align: top;">
                            <div style="margin-bottom:4px;"><span style="background:#8b5cf6; color:white; padding:2px 8px; border-radius:12px; font-size:10px; font-weight:bold;">${vcStages[vc.stageIdx]}</span></div>
                            <div class="text-success" style="font-size:16px; font-weight:900;">¥${(vc.val >= 100000000 ? (vc.val / 100000000).toFixed(1) + '億' : (vc.val / 10000).toLocaleString() + '万')}</div>
                        </td>
                        <td style="text-align:right; padding:15px 12px; min-width: 200px; vertical-align: top;">

        };


        // ==========================================
        // 🦄 VC出資モーダル（MAXボタン＆資金表示付きリッチ版）

            let p = companies[0], sub = companies.find(c => c.id === subId), subProps = ownedProperties.filter(prop => prop.owner === subId);

            }
        };
        window.subActionMerge = function (subId) {
            let p = companies[0], subIdx = companies.findIndex(c => c.id === subId), sub = companies[subIdx];
            if (confirm(`【吸収合併】${sub.name} を完全に解散し、全資産を自社に統合します。`)) {

            const originalTurnForVC = window.executeTurn;
            window.executeTurn = function () {
                originalTurnForVC(); // 元のターン処理と利息処理を実行

                // 🦄 追加：AIがベンチャーにガンガン投資するロジック
                vcMarket.forEach(vc => {
                    if (vc.status !== 'Active' || week - vc.spawnWeek < 1) return;
                    companies.forEach(c => {
                        if (c.id === 'player' || c.isBankrupt || !c.isPublic) return;

                        // 証券・金融は25%、その他は8%の確率で投資を検討（以前より大幅UP！）
                        let prob = (c.sector === 'securities' || c.sector === 'finance') ? 0.25 : 0.08;
                        let investAmount = Math.floor(vc.val * (Math.random() * 0.20 + 0.05)); // 価値の5〜25%をドカンと投資

                        if (c.cash > investAmount * 2 && Math.random() < prob) {
                            c.cash -= investAmount;
                            vc.investors[c.id] = (vc.investors[c.id] || 0) + investAmount;
                            vc.val += investAmount;
                        }
                    });
                });

                // VC画面を開いている場合はリアルタイムに更新
                if (document.getElementById('view-vc')?.classList.contains('active')) updateVCView();
            };
        }
    </script>
</body>
